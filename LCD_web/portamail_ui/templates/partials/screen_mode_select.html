<section class="screen active" data-screen="MODE_SELECT" id="screenModeSelect">
  <div class="status emphasized">Select Operating Mode</div>
  <div class="button-row mode-select-row">
    <button class="btn big mode-btn nav-mode-btn"
            data-bit="select_navigation_pressed"
            data-edge="select_navigation">
      Navigation
    </button>
    <button class="btn big mode-btn map-mode-btn"
            data-bit="select_mapping_pressed"
            data-edge="select_mapping">
      Mapping
    </button>
  </div>
  <div class="status mode-hint">Navigation: autonomous delivery &nbsp;|&nbsp; Mapping: build a new map with joystick</div>
</section>
