<section class="screen has-footer active" data-screen="HOME" id="screenHome">
  <div class="screen-body">
    <div class="status">Select destination</div>
    <div class="button-row">
      <button class="btn big room-btn destination-btn" data-room-target="ROOM1">Room 1</button>
      <button class="btn big room-btn destination-btn" data-room-target="ROOM2">Room 2</button>
      <button class="btn big room-btn destination-btn origin-btn" data-room-target="ORIGIN">Origin</button>
    </div>
  </div>
  <div class="screen-footer">
    <button class="btn back-btn" data-bit="back_pressed" data-edge="go_back">← Back</button>
    <button class="btn deliver-btn" id="deliverStartBtn" disabled>Deliver</button>
    <button class="btn power" data-bit="power_pressed" data-edge="power_edge">Power</button>
  </div>
</section>
