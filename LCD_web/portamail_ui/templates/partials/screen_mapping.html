<section class="screen" data-screen="MAPPING" id="screenMapping">
  <div class="status emphasized mapping-title">Mapping Mode Active</div>
  <div class="status">Drive the robot with the Xbox controller to map the environment.<br>Hold RB to enable movement.</div>
  <button class="btn big save-map-btn"
          data-bit="save_map_pressed"
          data-edge="save_map">
    Save Map
  </button>
  <button class="btn power" data-bit="power_pressed" data-edge="power_edge">Power</button>
</section>
