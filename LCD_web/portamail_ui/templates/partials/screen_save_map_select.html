<section class="screen has-footer" data-screen="SAVE_MAP_SELECT" id="screenSaveMapSelect">
  <div class="screen-body">
    <div class="status emphasized mapping-title">Save Current Location As…</div>
    <div class="status">The robot's current position will be saved as the selected waypoint.</div>
    <div class="button-row save-location-row">
      <button class="btn big save-location-btn"
              data-bit="save_location_room1_pressed"
              data-edge="save_location_room1">
        Room 1
      </button>
      <button class="btn big save-location-btn"
              data-bit="save_location_room2_pressed"
              data-edge="save_location_room2">
        Room 2
      </button>
      <button class="btn big save-location-btn origin-location-btn"
              data-bit="save_location_origin_pressed"
              data-edge="save_location_origin">
        Origin
      </button>
      <button class="btn big save-location-btn save-location-none-btn"
              data-bit="save_location_none_pressed"
              data-edge="save_location_none">
        Don't Save Position
      </button>
    </div>
  </div>
  <div class="screen-footer">
    <button class="btn back-btn" data-bit="back_pressed" data-edge="go_back">← Back</button>
    <div></div>
  </div>
</section>
